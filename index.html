<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gawynt Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #666666;
            --accent: #3b82f6; /* Modern Electric Blue */
            --danger: #ef4444;
            --btn-bg: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 360px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimalist Branding */
        .brand {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .brand span {
            color: var(--accent);
        }

        /* Calculator Unit */
        .calculator {
            background: var(--surface);
            padding: 28px;
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* High-Definition Display */
        .display {
            text-align: right;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        #history {
            font-size: 0.9rem;
            color: var(--text-dim);
            min-height: 1.2rem;
            margin-bottom: 4px;
        }

        #result {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            height: 65px;
            border-radius: 20px;
            border: none;
            background: var(--btn-bg);
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background: #333333;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.92);
            background: #444444;
        }

        /* Functional Styles */
        .op {
            color: var(--accent);
            font-weight: 600;
        }

        .clear {
            color: var(--danger);
        }

        .equal {
            background: var(--accent);
            color: #ffffff;
            font-weight: 600;
        }

        .equal:hover {
            background: #60a5fa;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* Small interaction animation */
        .digit-animate {
            animation: tap 0.1s ease;
        }
        @keyframes tap {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">Gawynt <span>Calculator</span></div>
        
        <div class="calculator">
            <div class="display">
                <div id="history"></div>
                <div id="result">0</div>
            </div>

            <div class="grid">
                <button class="clear" onclick="clearDisplay()">AC</button>
                <button class="op" onclick="deleteChar()">⌫</button>
                <button class="op" onclick="inputOp('%')">%</button>
                <button class="op" onclick="inputOp('/')">÷</button>

                <button onclick="inputDigit('7')">7</button>
                <button onclick="inputDigit('8')">8</button>
                <button onclick="inputDigit('9')">9</button>
                <button class="op" onclick="inputOp('*')">×</button>

                <button onclick="inputDigit('4')">4</button>
                <button onclick="inputDigit('5')">5</button>
                <button onclick="inputDigit('6')">6</button>
                <button class="op" onclick="inputOp('-')">−</button>

                <button onclick="inputDigit('1')">1</button>
                <button onclick="inputDigit('2')">2</button>
                <button onclick="inputDigit('3')">3</button>
                <button class="op" onclick="inputOp('+')">+</button>

                <button onclick="inputDigit('0')" style="grid-column: span 2; width: 100%;">0</button>
                <button onclick="inputDigit('.')">.</button>
                <button class="equal" onclick="solve()">=</button>
            </div>
        </div>
    </div>

    <script>
        let current = '0';
        let storedValue = '';
        let operator = null;
        let waitingForOperand = false;

        const display = document.getElementById('result');
        const history = document.getElementById('history');

        function updateDisplay() {
            display.innerText = current;
            if (current.length > 8) {
                display.style.fontSize = '2.2rem';
            } else {
                display.style.fontSize = '3.5rem';
            }
        }

        function inputDigit(digit) {
            if (waitingForOperand) {
                current = digit;
                waitingForOperand = false;
            } else {
                current = current === '0' ? digit : current + digit;
            }
            updateDisplay();
        }

        function inputOp(nextOp) {
            const val = parseFloat(current);

            if (operator && waitingForOperand) {
                operator = nextOp;
                history.innerText = `${storedValue} ${operator}`;
                return;
            }

            if (storedValue === '') {
                storedValue = val;
            } else if (operator) {
                const result = performCalc(storedValue, val, operator);
                current = String(result);
                storedValue = result;
            }

            operator = nextOp;
            waitingForOperand = true;
            history.innerText = `${storedValue} ${operator}`;
            updateDisplay();
        }

        function performCalc(a, b, op) {
            switch(op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b === 0 ? 'Error' : a / b;
                case '%': return a % b;
                default: return b;
            }
        }

        function solve() {
            if (!operator || waitingForOperand) return;
            const val = parseFloat(current);
            const result = performCalc(storedValue, val, operator);
            
            history.innerText = '';
            current = String(Number(result.toFixed(8))); // Sanitize floating points
            storedValue = '';
            operator = null;
            waitingForOperand = true;
            updateDisplay();
        }

        function clearDisplay() {
            current = '0';
            storedValue = '';
            operator = null;
            waitingForOperand = false;
            history.innerText = '';
            updateDisplay();
        }

        function deleteChar() {
            current = current.length > 1 ? current.slice(0, -1) : '0';
            updateDisplay();
        }

        // Keyboard Logic
        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) inputDigit(e.key);
            if (e.key === '.') inputDigit('.');
            if (e.key === 'Enter' || e.key === '=') solve();
            if (e.key === 'Backspace') deleteChar();
            if (e.key === 'Escape') clearDisplay();
            if (['+', '-', '*', '/', '%'].includes(e.key)) inputOp(e.key);
        });
    </script>
</body>
</html>
